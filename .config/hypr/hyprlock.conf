background {
    blur_passes = 3
    contrast = 0.6
    vibrancy = 0.8
}

input-field {
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgb(209, 207, 207)
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = 18 # -1 means complete rounding (circle/oval)
    fail_color = rgba(191, 97, 106, 0.75)
    check_color = rgba(235, 203, 139, 0.75) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below
    position = 0, -60
    halign = center
    valign = center
}

# Date
label {
  text = cmd[update:1000] echo "<b>$(date +"%A, %B %d")</b>"
  color = rgba(255, 255, 255, 0.9)
  font_size = 16
  font_family = GeistMono Nerd Font Propo
  position = 0, 108
  halign = center
  valign = center
}

# Time
label {
    text = cmd[update:1000] echo "<b>$TIME</b>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 64
    font_family = GeistMono Nerd Font Propo
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}

# Layout
label {
    text = $LAYOUT
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    font_family = GeistMono Nerd Font Propo
    position = -16, 20
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}