[widgets]
enabled = true

[panel]
enabled = true
spacing = 10
# thickness = 0
position = "bottom"
modules_left = ["workspaces"]
modules_center = []
modules_right = ["battery", "clock"]

[panel.battery]
icons = ["蟀値", "蟀伜", "蟀伝", "蟀伡", "蟀伣", "蟀伨", "蟀伩", "蟀個", "蟀倎", "蟀倐", "蟀伖"]
name = "BAT1"
format = "ahah {icon} {charge}%"

[panel.clock]
format = "%a %e %b %H:%M"
# format = "%H:%M"
