[widgets]
enabled = true

[taskbar]
enabled = true
position = "top"
modules_left = ["workspaces"]
modules_center = []
modules_right = ["battery", "clock"]

[taskbar.battery]
icons = ["蟀値", "蟀伜", "蟀伝", "蟀伡", "蟀伣", "蟀伨", "蟀伩", "蟀個", "蟀倎", "蟀倐", "蟀伖"]
name = "BAT1"
format = "{icon} {charge}%"

[taskbar.clock]
format = "%a %e %b %H:%M"
